name: Deploy docs to GitHub Pages

on:
  push:
    branches: [main, community-v2]
    paths:
      - 'docs/**'
      - '.github/workflows/docs-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # mirror secundário em scarpellinigilmar.github.io/Skargrid/ — o site
      # principal (skargrid.com, na Hostinger) usa base '/' e é publicado
      # separadamente.
      - run: npm run docs:build
        env:
          DOCS_BASE: /Skargrid/
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
